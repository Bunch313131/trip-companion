<!DOCTYPE html>
<html>
<head>

</head>
<body>
<x-dc>
<div style="width:390px; height:844px; background:#fff; color:var(--text,#17212C); font-family:var(--ui,'Inter'),system-ui,sans-serif; border-radius:38px; overflow:hidden; box-shadow:0 30px 60px -20px rgba(20,25,35,.28), 0 0 0 1px var(--border,#E6E1D8); display:flex; flex-direction:column; position:relative;">
  <!-- chrome status + url bar -->
  <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 22px 4px; font-size:13px; font-weight:600; color:#202124;">
    <span style="font-variant-numeric:tabular-nums; font-family:var(--mono,'JetBrains Mono'),monospace;">9:41</span>
    <span style="display:flex; gap:5px; align-items:center;"><svg width="15" height="12" viewBox="0 0 24 20" fill="#202124"><path d="M12 3C7 3 3 7 1 10c2 3 6 7 11 7s9-4 11-7c-2-3-6-7-11-7z" opacity=".0"/></svg><span style="width:16px; height:10px; border:1.5px solid #202124; border-radius:2px; display:inline-block; position:relative;"><span style="position:absolute; inset:1.5px; width:80%; background:#202124;"></span></span></span>
  </div>
  <div style="display:flex; align-items:center; gap:10px; padding:8px 16px 10px;">
    <div style="flex:1; display:flex; align-items:center; gap:8px; background:#f1f3f4; border-radius:22px; padding:8px 14px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="#5f6368"><path d="M12 2a7 7 0 00-7 7v2H4v9a1 1 0 001 1h14a1 1 0 001-1v-9h-1V9a7 7 0 00-7-7zm5 9H7V9a5 5 0 0110 0z"/></svg>
      <span style="font-size:13.5px; color:#202124;">trip-companion.app</span>
      <span style="margin-left:auto; color:#5f6368; font-size:16px;">⋮</span>
    </div>
  </div>

  <!-- app content -->
  <div style="flex:1; background:var(--bg,#F1EEE7); padding:16px 22px; overflow:hidden;">
    <div style="font-family:var(--display,'Manrope'),sans-serif; font-size:22px; font-weight:700; letter-spacing:-.02em; color:var(--text,#17212C);">Europe Family Trip</div>
    <div style="margin-top:14px; background:var(--primary,#1E4E80); color:#fff; border-radius:22px; padding:22px; opacity:.9;">
      <div style="font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; opacity:.8;">Countdown</div>
      <div style="font-family:var(--display,'Manrope'),sans-serif; font-size:52px; font-weight:700; line-height:.9; margin-top:6px;">6</div>
      <div style="font-size:13px; opacity:.85; margin-top:8px;">days to departure · SMF → DUS</div>
    </div>
  </div>

  <!-- dim -->
  <div style="position:absolute; inset:0; background:rgba(15,20,28,.45); border-radius:38px;"></div>

  <!-- Chrome native install bottom sheet -->
  <div style="position:absolute; left:8px; right:8px; bottom:8px; background:#fff; border-radius:22px 22px 30px 30px; padding:22px 20px 26px; box-shadow:0 -18px 44px -18px rgba(0,0,0,.4);">
    <div style="display:flex; align-items:center; gap:14px;">
      <span style="width:52px; height:52px; border-radius:13px; background:var(--primary,#1E4E80); color:#fff; display:grid; place-items:center; font-family:var(--display,'Manrope'),sans-serif; font-weight:700; font-size:22px; flex:none;">T</span>
      <div style="flex:1;">
        <div style="font-size:17px; font-weight:600; color:#202124;">Install Trip Companion</div>
        <div style="font-size:13px; color:#5f6368; margin-top:2px;">trip-companion.app</div>
      </div>
    </div>
    <div style="margin-top:14px; font-size:13.5px; color:#3c4043; line-height:1.55;">Adds an icon to your home screen and runs full-screen — offline-ready for flights, tunnels and mountain passes.</div>
    <div style="margin-top:18px; display:flex; align-items:center; justify-content:flex-end; gap:8px;">
      <span style="font-size:14px; font-weight:600; color:#1a73e8; padding:10px 16px;">Not now</span>
      <span style="font-size:14px; font-weight:600; color:#fff; background:var(--primary,#1E4E80); padding:10px 22px; border-radius:22px;">Install</span>
    </div>
  </div>
</div>

<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}"></script>
