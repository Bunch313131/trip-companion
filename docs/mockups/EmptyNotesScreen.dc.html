<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:390px; height:844px; background:var(--bg,#F1EEE7); color:var(--text,#17212C); font-family:var(--ui,'Inter'),system-ui,sans-serif; border-radius:38px; overflow:hidden; box-shadow:0 30px 60px -20px rgba(20,25,35,.28), 0 0 0 1px var(--border,#E6E1D8); display:flex; flex-direction:column;">
  <div style="display:flex; justify-content:space-between; align-items:center; padding:14px 26px 6px; font-size:14px; font-weight:600;">
    <span style="font-variant-numeric:tabular-nums; font-family:var(--mono,'JetBrains Mono'),monospace;">9:41</span>
    <span style="width:17px; height:10px; border:1.5px solid var(--text,#17212C); border-radius:3px; display:inline-block; position:relative;"><span style="position:absolute; inset:1.5px; width:70%; background:var(--text,#17212C); border-radius:1px;"></span></span>
  </div>
  <div style="padding:8px 22px 12px;">
    <div style="font-family:var(--display,'Manrope'),sans-serif; font-size:22px; font-weight:700; letter-spacing:-.02em;">Notes</div>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 40px;">
    <svg width="104" height="96" viewBox="0 0 104 96" fill="none">
      <rect x="22" y="12" width="60" height="72" rx="8" fill="#fff" stroke="#1E4E80" stroke-width="2" transform="rotate(-4 52 48)"/>
      <path d="M35 34h34M35 44h34M35 54h24" stroke="#8A93A0" stroke-width="2" stroke-linecap="round" transform="rotate(-4 52 48)"/>
      <circle cx="76" cy="70" r="15" fill="#E0A43B"/>
      <path d="M70 70l4 4 7-8" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div style="font-family:var(--display,'Manrope'),sans-serif; font-size:19px; font-weight:700; margin-top:22px; letter-spacing:-.01em;">A blank page, on purpose</div>
    <div style="font-size:13.5px; color:var(--text-dim,#56626F); line-height:1.55; margin-top:8px;">Jot ideas, packing lists, restaurant shortlists — anything. Pin a note to a stop and it shows up where you need it.</div>
    <div style="margin-top:22px; width:100%;">
      <span style="display:block; background:var(--primary,#1E4E80); color:var(--primary-ink,#fff); font-size:14px; font-weight:600; padding:12px 0; border-radius:13px;">Start a note</span>
    </div>
  </div>

  <div style="background:var(--surface,#fff); border-top:1px solid var(--border,#E6E1D8); display:flex; justify-content:space-around; padding:11px 8px 22px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text-mute,#8A93A0);"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 10l9-7 9 7v9a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1z"/></svg><span style="font-size:9.5px;">Today</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text-mute,#8A93A0);"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M8 6h13M8 12h13M8 18h13M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg><span style="font-size:9.5px;">Trip</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text-mute,#8A93A0);"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg><span style="font-size:9.5px;">Bookings</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text-mute,#8A93A0);"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M12 21s7-5.5 7-11a7 7 0 10-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.4"/></svg><span style="font-size:9.5px;">Map</span></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text-mute,#8A93A0);"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M4 5h16v11H9l-4 4z"/></svg><span style="font-size:9.5px;">Chat</span></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}"></script>
</body>
</html>
